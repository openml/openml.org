name: release-docker-next

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag of the published docker image. Format: v[Major].[Minor].[Patch] (do not forget the v).'
        required: true
        type: string


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: app-next
          file: app-next/Dockerfile
          tags: ${{ inputs.tag }}
          platforms: linux/amd64,linux/arm64
          push: true

      - name: Update repo description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: openml/frontend
          short-description: "NextJS Frontend for OpenML."
          readme-filepath: ./app-next/docker/README.md

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
