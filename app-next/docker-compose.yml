###############################################################################
# OpenML Next.js - Docker Compose (Local Docker Testing)
###############################################################################
# PURPOSE: Test the Docker image locally before pushing to Kubernetes
#
# USAGE:
#   docker compose up --build        # Build and start
#   docker compose up                # Start (using existing image)
#   docker compose down              # Stop and remove container
#
# NOTE: This file is for local Docker testing only.
#       For development: use `npm run dev` instead (faster, hot reload)
#       For production:  use Kubernetes with ConfigMaps and Secrets
#
# SINGLE-IMAGE STRATEGY:
#   - NO build.args for NEXT_PUBLIC_* variables
#   - All variables are injected at RUNTIME via environment:
#   - Same image can run in dev, test, preprod, production
#   - See: k8s/SINGLE_IMAGE_NEXTJS_DEPLOYMENT.md
###############################################################################

services:
  openml-next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openml-next
    restart: unless-stopped
    ports:
      - "3050:3050"

    # Load all variables from .env.local for local testing
    # For production: use Kubernetes ConfigMaps and Secrets instead
    env_file:
      - .env.local

    environment:
      # --- Core (override .env.local) ---
      NODE_ENV: production
      PORT: "3050"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"

      # --- Public URLs (runtime injection via window.__ENV__) ---
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3050}
      NEXT_PUBLIC_OPENML_URL: ${NEXT_PUBLIC_OPENML_URL:-https://www.openml.org}
      NEXT_PUBLIC_URL_API: ${NEXT_PUBLIC_URL_API:-https://www.openml.org/api/v1}
      NEXT_PUBLIC_URL_SITE_BACKEND: ${NEXT_PUBLIC_URL_SITE_BACKEND:-https://www.openml.org}
      NEXT_PUBLIC_ELASTICSEARCH_SERVER: ${NEXT_PUBLIC_ELASTICSEARCH_SERVER:-https://www.openml.org/es}
      NEXT_PUBLIC_ELASTICSEARCH_VERSION_MAYOR: ${NEXT_PUBLIC_ELASTICSEARCH_VERSION_MAYOR:-8}
      NEXT_PUBLIC_ENABLE_ELASTICSEARCH: ${NEXT_PUBLIC_ENABLE_ELASTICSEARCH:-true}
      NEXT_PUBLIC_URL_MINIO: ${NEXT_PUBLIC_URL_MINIO:-https://www.openml.org/data}
      NEXT_PUBLIC_ENABLE_MINIO: ${NEXT_PUBLIC_ENABLE_MINIO:-true}

      # --- Server-side URLs ---
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-https://www.openml.org/es}
      ELASTICSEARCH_SERVER: ${ELASTICSEARCH_SERVER:-https://www.openml.org/es}
      FLASK_BACKEND_URL: ${FLASK_BACKEND_URL:-https://www.openml.org}

      # --- Database ---
      DATABASE_URL: ${DATABASE_URL}

      # --- Authentication ---
      SESSION_SECRET: ${SESSION_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3050}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      # --- OAuth ---
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      GOOGLE_ID: ${GOOGLE_ID}
      GOOGLE_SECRET: ${GOOGLE_SECRET}

      # --- WebAuthn / Passkeys ---
      RP_ID: ${RP_ID:-localhost}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost:3050}

      # --- Email / SMTP ---
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-"OpenML <noreply@openml.org>"}

      # --- CORS ---
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3050}

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3050/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
