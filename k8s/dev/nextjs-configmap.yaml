###############################################################################
# OpenML Next.js - ConfigMap (Development / Test)
###############################################################################
# Contains NON-SECRET configuration for the Next.js frontend.
# Secrets (passwords, tokens, keys) go in nextjs-secrets.yaml
#
# Apply: kubectl apply -f k8s/dev/nextjs-configmap.yaml
###############################################################################

apiVersion: v1
kind: ConfigMap
metadata:
    name: openml-next-dev-config
    namespace: openml-dev
    labels:
        app: openml-next
        environment: development
data:
    # --- Node ---
    NODE_ENV: "production"

    # --- Public URL (visible in browser via window.__ENV__) ---
    NEXT_PUBLIC_URL: "https://test.openml.org"
    NEXT_PUBLIC_OPENML_API_URL: "https://test.openml.org"
    NEXT_PUBLIC_API_URL: "https://test.openml.org"
    NEXT_PUBLIC_URL_API: "https://test.openml.org/api/v1"
    NEXT_PUBLIC_URL_SITE_BACKEND: "https://test.openml.org"

    # --- Elasticsearch (public) ---
    NEXT_PUBLIC_URL_ELASTICSEARCH: "https://test.openml.org/es"
    NEXT_PUBLIC_ELASTICSEARCH_SERVER: "https://test.openml.org/es"
    NEXT_PUBLIC_ELASTICSEARCH_VERSION_MAYOR: "8"
    NEXT_PUBLIC_ENABLE_ELASTICSEARCH: "true"

    # --- MinIO / Storage (public) ---
    NEXT_PUBLIC_URL_MINIO: "https://test.openml.org/data"
    NEXT_PUBLIC_ENABLE_MINIO: "true"

    # --- Server-side URLs (not exposed to browser) ---
    ELASTICSEARCH_URL: "https://test.openml.org/es"
    ELASTICSEARCH_SERVER: "https://test.openml.org/es"
    FLASK_BACKEND_URL: "http://openml-backend-dev:5000"

    # --- NextAuth ---
    NEXTAUTH_URL: "https://test.openml.org"

    # --- WebAuthn / Passkeys ---
    RP_ID: "test.openml.org"
    RP_ORIGIN: "https://test.openml.org"

    # --- CORS ---
    CORS_ORIGINS: "https://test.openml.org"

    # --- Email / SMTP (non-secret part) ---
    SMTP_HOST: "smtp.provider.com"
    SMTP_PORT: "587"
    SMTP_SECURE: "false"
    SMTP_FROM: "OpenML <noreply@openml.org>"
