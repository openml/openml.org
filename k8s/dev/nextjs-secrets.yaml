###############################################################################
# OpenML Next.js - Secrets (Development / Test)
###############################################################################
# Contains SENSITIVE values for the Next.js frontend.
# Non-secret config goes in nextjs-configmap.yaml
#
# ⚠️  These are DEVELOPMENT secrets only - not for production!
# ⚠️  Never commit real production secrets to git!
#
# Apply: kubectl apply -f k8s/dev/nextjs-secrets.yaml
#
# Or create from CLI (preferred - avoids storing secrets in files):
#   kubectl create secret generic openml-next-dev-secrets \
#     --from-literal=DATABASE_URL="mysql://user:pass@host:3306/db" \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=NEXTAUTH_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=GITHUB_ID="your-github-id" \
#     --from-literal=GITHUB_SECRET="your-github-secret" \
#     --from-literal=GOOGLE_ID="your-google-id" \
#     --from-literal=GOOGLE_SECRET="your-google-secret" \
#     --from-literal=SMTP_USER="noreply@openml.org" \
#     --from-literal=SMTP_PASS="your-smtp-password" \
#     --namespace openml-dev
###############################################################################

apiVersion: v1
kind: Secret
metadata:
    name: openml-next-dev-secrets
    namespace: openml-dev
    labels:
        app: openml-next
        environment: development
type: Opaque
stringData:
    # --- Database ---
    DATABASE_URL: "mysql://openml:CHANGE-ME@mysql-dev:3306/openml_dev"

    # --- Session & NextAuth ---
    # Generate with: openssl rand -base64 32
    SESSION_SECRET: "CHANGE-ME-dev-session-secret"
    NEXTAUTH_SECRET: "CHANGE-ME-dev-nextauth-secret"

    # --- GitHub OAuth ---
    # Create at: https://github.com/settings/developers
    # Callback URL: https://test.openml.org/api/auth/callback/github
    GITHUB_ID: "CHANGE-ME-github-client-id"
    GITHUB_SECRET: "CHANGE-ME-github-client-secret"

    # --- Google OAuth ---
    # Create at: https://console.cloud.google.com/apis/credentials
    # Callback URL: https://test.openml.org/api/auth/callback/google
    GOOGLE_ID: "CHANGE-ME-google-client-id.apps.googleusercontent.com"
    GOOGLE_SECRET: "CHANGE-ME-google-client-secret"

    # --- Email / SMTP ---
    SMTP_USER: "noreply@openml.org"
    SMTP_PASS: "CHANGE-ME-smtp-password"
