###############################################################################
# OpenML Next.js - ConfigMap (Production)
###############################################################################
# Contains NON-SECRET configuration for the Next.js frontend.
# Secrets (passwords, tokens, keys) go in nextjs-secrets.yaml.template
#
# Apply: kubectl apply -f k8s/prod/nextjs-configmap.yaml
###############################################################################

apiVersion: v1
kind: ConfigMap
metadata:
    name: openml-next-prod-config
    namespace: openml-prod
    labels:
        app: openml-next
        environment: production
data:
    # --- Node ---
    NODE_ENV: "production"

    # --- Public URLs (visible in browser via window.__ENV__) ---
    NEXT_PUBLIC_URL: "https://www.openml.org"
    NEXT_PUBLIC_OPENML_API_URL: "https://www.openml.org"
    NEXT_PUBLIC_API_URL: "https://www.openml.org"
    NEXT_PUBLIC_URL_API: "https://www.openml.org/api/v1"
    NEXT_PUBLIC_URL_SITE_BACKEND: "https://www.openml.org"

    # --- Elasticsearch (public) ---
    NEXT_PUBLIC_URL_ELASTICSEARCH: "https://www.openml.org/es"
    NEXT_PUBLIC_ELASTICSEARCH_SERVER: "https://www.openml.org/es"
    NEXT_PUBLIC_ELASTICSEARCH_VERSION_MAYOR: "8"
    NEXT_PUBLIC_ENABLE_ELASTICSEARCH: "true"

    # --- MinIO / Storage (public) ---
    NEXT_PUBLIC_URL_MINIO: "https://www.openml.org/data"
    NEXT_PUBLIC_ENABLE_MINIO: "true"

    # --- Server-side URLs (not exposed to browser) ---
    ELASTICSEARCH_URL: "https://www.openml.org/es"
    ELASTICSEARCH_SERVER: "https://www.openml.org/es"
    FLASK_BACKEND_URL: "http://openml-backend-prod:5000"

    # --- NextAuth ---
    NEXTAUTH_URL: "https://www.openml.org"

    # --- WebAuthn / Passkeys ---
    RP_ID: "openml.org"
    RP_ORIGIN: "https://www.openml.org"

    # --- CORS ---
    CORS_ORIGINS: "https://www.openml.org,https://openml.org"

    # --- Email / SMTP (non-secret part) ---
    SMTP_HOST: "smtp.production-provider.com"
    SMTP_PORT: "587"
    SMTP_SECURE: "false"
    SMTP_FROM: "OpenML <noreply@openml.org>"
