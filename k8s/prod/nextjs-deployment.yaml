###############################################################################
# OpenML Next.js - Deployment + Service + HPA (Production)
###############################################################################
# Image is published to DockerHub by GitHub Actions:
#   openml/frontend:vX.Y.Z  (semver tags)
#
# Apply:        kubectl apply -f k8s/prod/nextjs-deployment.yaml
# Update image: kubectl set image deployment/openml-next-prod \
#               openml-next=openml/frontend:v1.2.3 -n openml-prod
# Rollback:     kubectl rollout undo deployment/openml-next-prod -n openml-prod
# Status:       kubectl rollout status deployment/openml-next-prod -n openml-prod
###############################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
    name: openml-next-prod
    namespace: openml-prod
    labels:
        app: openml-next
        environment: production
spec:
    replicas: 3
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0 # Zero downtime deployments

    selector:
        matchLabels:
            app: openml-next
            environment: production

    template:
        metadata:
            labels:
                app: openml-next
                environment: production

        spec:
            # Spread pods across nodes for high availability
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchExpressions:
                                      - key: app
                                        operator: In
                                        values:
                                            - openml-next
                              topologyKey: kubernetes.io/hostname

            containers:
                - name: openml-next
                  # Image built by GitHub Actions → .github/workflows/release_docker_next.yaml
                  # Published to: https://hub.docker.com/r/openml/frontend
                  # ⚠️  Always pin to a specific semver tag in production (never :latest)
                  image: openml/frontend:v1.0.0
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 3050
                        name: http
                        protocol: TCP

                  # Non-secret config from ConfigMap
                  envFrom:
                      - configMapRef:
                            name: openml-next-prod-config

                  # Secrets injected individually
                  env:
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: DATABASE_URL
                      - name: SESSION_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: SESSION_SECRET
                      - name: NEXTAUTH_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: NEXTAUTH_SECRET
                      - name: GITHUB_ID
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: GITHUB_ID
                      - name: GITHUB_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: GITHUB_SECRET
                      - name: GOOGLE_ID
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: GOOGLE_ID
                      - name: GOOGLE_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: GOOGLE_SECRET
                      - name: SMTP_USER
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: SMTP_USER
                      - name: SMTP_PASS
                        valueFrom:
                            secretKeyRef:
                                name: openml-next-prod-secrets
                                key: SMTP_PASS

                  # Health checks (production - stricter)
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3050
                      initialDelaySeconds: 60
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3050
                      initialDelaySeconds: 20
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 2

                  startupProbe:
                      httpGet:
                          path: /
                          port: 3050
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 30 # 5 minutes to start

                  # Resource limits (production)
                  resources:
                      requests:
                          cpu: "500m"
                          memory: "1Gi"
                      limits:
                          cpu: "2"
                          memory: "4Gi"

                  # Security context
                  securityContext:
                      allowPrivilegeEscalation: false
                      runAsNonRoot: true
                      runAsUser: 1001
                      capabilities:
                          drop:
                              - ALL

---
apiVersion: v1
kind: Service
metadata:
    name: openml-next-prod
    namespace: openml-prod
    labels:
        app: openml-next
        environment: production
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3050
          protocol: TCP
          name: http
    selector:
        app: openml-next
        environment: production

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: openml-next-prod-hpa
    namespace: openml-prod
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: openml-next-prod
    minReplicas: 3
    maxReplicas: 10
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 80
